    validation_images: 8
    precision: 1.0
    recall: 1.0
    dropout_probability: 0.0
    false_positive_per_image: 0.0
    mean_center_error_px: 0.529
    p95_center_error_px: 0.945

next_steps:
  - Audit this contract before training or shadow replay.
  - Use the active port ROI noise model in the next residual-SAC training/evaluation run.
  - Add hard negatives when rejected or non-port real images become available.
  - Treat the current detector result as small-sample ROI/noise evidence, not broad detector generalization.
